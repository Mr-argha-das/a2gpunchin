<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css?v=20260613-white1" rel="stylesheet">
</head>
<body class="login-page">
  <form class="login-panel" id="loginForm">
    <h1>rMatrix</h1>
    <p class="text-muted">Sign in to your company portal.</p>
    <label class="form-label">Email</label>
    <input class="form-control" type="email" name="email" required>
    <label class="form-label mt-3">Password</label>
    <input class="form-control" type="password" name="password" required minlength="8">
    <button class="btn btn-primary w-100 mt-4" type="submit">Sign in</button>
    <div class="small text-muted mt-3">Use the seeded super admin to get started.</div>
  </form>
  <script src="/static/js/app.js?v=20260613-reportfilters3"></script>
</body>
</html>
