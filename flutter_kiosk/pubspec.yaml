name: attendance_kiosk
description: Branch kiosk app for face-based punch in and punch out.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  flutter_tts: ^4.2.2
  fluttertoast: ^8.2.12
  http: ^1.2.2
  http_parser: ^4.0.2
  path_provider: ^2.1.5
  record: ^5.2.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  record_platform_interface: 1.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
